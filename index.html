<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>慶應中等部サッカー部 走力ランキング</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/lucide-static@latest/font/lucide.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-screen" class="screen active">
    <div class="login-container">
      <div class="login-logo">
        <div class="logo-icon"><i class="lucide-dribbble"></i></div>
        <h1>慶應中等部サッカー部</h1>
        <p class="login-subtitle">SPRINT RANKING</p>
      </div>
      <div class="login-form">
        <div class="input-wrapper">
          <i class="lucide-lock input-icon"></i>
          <input type="text" id="password-input" placeholder="Enter password" autocomplete="off">
        </div>
        <button id="login-btn" class="btn btn-primary">Log in</button>
        <p id="login-error" class="error-text"></p>
      </div>
    </div>
  </div>

  <!-- メインダッシュボード -->
  <div id="dashboard-screen" class="screen">
    <header>
      <div class="header-content">
        <h1>SPRINT RANKING</h1>
        <div class="header-right">
          <span id="role-badge" class="badge"></span>
          <button id="logout-btn" class="btn btn-small btn-outline">ログアウト</button>
        </div>
      </div>
    </header>
    <main class="container">
      <div id="menu-buttons" class="menu-grid">
        <button class="menu-card" onclick="showRanking()">
          <div class="menu-icon"><i class="lucide-trophy"></i></div>
          <div class="menu-label">Results</div>
          <div class="menu-desc">ランキング・記録を確認</div>
        </button>
        <button id="menu-time-input" class="menu-card admin-only" onclick="showTimeInput()">
          <div class="menu-icon"><i class="lucide-timer"></i></div>
          <div class="menu-label">Record</div>
          <div class="menu-desc">新しい記録を追加</div>
        </button>
        <button id="menu-time-edit" class="menu-card admin-only" onclick="showTimeEdit()">
          <div class="menu-icon"><i class="lucide-pencil-line"></i></div>
          <div class="menu-label">Edit</div>
          <div class="menu-desc">過去の記録を編集・削除</div>
        </button>
      </div>
    </main>
  </div>

  <!-- ランキング画面 -->
  <div id="ranking-screen" class="screen">
    <header>
      <div class="header-content">
        <button class="btn btn-back" onclick="goBack('dashboard')"><i class="lucide-arrow-left"></i> 戻る</button>
        <h1>RANKING</h1>
        <div></div>
      </div>
    </header>
    <main class="container container-wide">
      <div class="search-bar">
        <i class="lucide-search search-icon"></i>
        <input type="text" id="ranking-search" placeholder="Search player..." oninput="filterRanking()">
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" data-grade="all">全員</button>
        <button class="filter-btn" data-grade="3年">3年</button>
        <button class="filter-btn" data-grade="2年">2年</button>
      </div>
      <div class="ranking-dual">
        <div class="ranking-column">
          <div class="ranking-column-header">20m走</div>
          <div id="ranking-list-20m" class="ranking-list"></div>
        </div>
        <div class="ranking-column">
          <div class="ranking-column-header">30m走</div>
          <div id="ranking-list-30m" class="ranking-list"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- 選手詳細画面（グラフ） -->
  <div id="player-detail-screen" class="screen">
    <header>
      <div class="header-content">
        <button class="btn btn-back" onclick="goBack('ranking')"><i class="lucide-arrow-left"></i> 戻る</button>
        <h1 id="player-detail-name"></h1>
        <div></div>
      </div>
    </header>
    <main class="container">
      <div class="tab-bar">
        <button class="tab active" onclick="switchDetailTab('20m', this)">20m走</button>
        <button class="tab" onclick="switchDetailTab('30m', this)">30m走</button>
      </div>
      <div class="chart-container">
        <canvas id="player-chart"></canvas>
      </div>
      <div id="player-records-list" class="records-list"></div>
    </main>
  </div>

  <!-- タイム一括入力画面 -->
  <div id="time-input-screen" class="screen">
    <header>
      <div class="header-content">
        <button class="btn btn-back" onclick="goBack('dashboard')"><i class="lucide-arrow-left"></i> 戻る</button>
        <h1>RECORD</h1>
        <button class="btn btn-accent btn-small" onclick="showAddPlayerModal()"><i class="lucide-user-plus"></i> 追加</button>
      </div>
    </header>
    <main class="container">
      <div class="search-bar">
        <i class="lucide-search search-icon"></i>
        <input type="text" id="batch-search" placeholder="Search player..." oninput="filterBatchInput()">
      </div>
      <div class="batch-controls">
        <div class="batch-row">
          <div class="form-group compact">
            <label>種目</label>
            <select id="batch-type">
              <option value="20m">20m走</option>
              <option value="30m">30m走</option>
            </select>
          </div>
          <div class="form-group compact">
            <label>日付</label>
            <input type="date" id="batch-date">
          </div>
        </div>
      </div>
      <div class="batch-table">
        <div class="batch-table-header">
          <span class="batch-col-name">選手名</span>
          <span class="batch-col-time">タイム（秒）</span>
        </div>
        <div id="batch-input-list" class="batch-table-body"></div>
      </div>
      <button class="btn btn-primary btn-full" onclick="submitBatchTimes()" style="margin-top:16px">一括保存</button>
    </main>
  </div>

  <!-- タイム修正画面（選手一覧） -->
  <div id="time-edit-screen" class="screen">
    <header>
      <div class="header-content">
        <button class="btn btn-back" onclick="goBack('dashboard')"><i class="lucide-arrow-left"></i> 戻る</button>
        <h1>EDIT</h1>
        <div></div>
      </div>
    </header>
    <main class="container">
      <div class="search-bar">
        <i class="lucide-search search-icon"></i>
        <input type="text" id="edit-search" placeholder="Search player..." oninput="filterEditList()">
      </div>
      <div id="player-list-edit" class="player-list"></div>
    </main>
  </div>

  <!-- タイム修正詳細画面 -->
  <div id="time-edit-detail-screen" class="screen">
    <header>
      <div class="header-content">
        <button class="btn btn-back" onclick="goBack('time-edit')"><i class="lucide-arrow-left"></i> 戻る</button>
        <h1 id="time-edit-player-name"></h1>
        <div></div>
      </div>
    </header>
    <main class="container">
      <div class="tab-bar">
        <button class="tab active" onclick="switchEditTab('20m', this)">20m走</button>
        <button class="tab" onclick="switchEditTab('30m', this)">30m走</button>
      </div>
      <div id="edit-records-list" class="records-list"></div>
    </main>
  </div>

  <!-- 選手追加モーダル -->
  <div id="add-player-modal" class="modal">
    <div class="modal-content">
      <h3>選手を追加</h3>
      <div class="form-group">
        <label>選手名</label>
        <input type="text" id="new-player-name" placeholder="名前を入力">
      </div>
      <div class="modal-buttons">
        <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="addPlayer()">追加</button>
      </div>
    </div>
  </div>

  <!-- タイム修正モーダル -->
  <div id="edit-record-modal" class="modal">
    <div class="modal-content">
      <h3>タイムを修正</h3>
      <div class="form-group">
        <label>タイム（秒）</label>
        <input type="number" id="edit-time" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>日時</label>
        <input type="datetime-local" id="edit-date">
      </div>
      <div class="modal-buttons">
        <button class="btn btn-outline" onclick="closeEditModal()">キャンセル</button>
        <button class="btn btn-danger" onclick="deleteRecord()">削除</button>
        <button class="btn btn-primary" onclick="updateRecord()">保存</button>
      </div>
    </div>
  </div>

  <!-- Toast通知 -->
  <div id="toast" class="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
